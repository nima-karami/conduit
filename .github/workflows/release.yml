name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Run the full authoritative gate (Biome, typecheck, tests, fallow, audit, Semgrep,
  # gitleaks) on Linux first. Semgrep has no native Windows build and the security scan
  # is best-effort there, so gating on Linux keeps it deterministic. The build only runs
  # if this passes.
  gate:
    uses: ./.github/workflows/verify.yml

  build-and-publish:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Build the installer + update metadata (latest.yml, blockmap) into dist/, but do
      # NOT let electron-builder publish. Its GitHub publisher uploads assets concurrently
      # and each upload races to get-or-create the release, intermittently producing TWO
      # release objects for one tag with the assets split between them (this bit v0.1.0 and
      # v0.1.1). We publish deterministically below instead.
      - run: npx electron-builder --win --publish never

      # One atomic `gh release create` uploads all three artifacts to a single release.
      # artifactName (package.json) yields a hyphenated installer name with no spaces, so
      # the uploaded asset name matches the url inside latest.yml exactly (else the updater
      # 404s). --generate-notes fills the body from commits since the previous tag.
      - name: Publish GitHub Release
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.exe dist/*.exe.blockmap dist/latest.yml \
            --title "Conduit $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
