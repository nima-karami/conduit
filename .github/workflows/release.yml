name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Run the full authoritative gate (Biome, typecheck, tests, fallow, audit, Semgrep,
  # gitleaks) on Linux first. Semgrep has no native Windows build and the security scan
  # is best-effort there, so gating on Linux keeps it deterministic. The build only runs
  # if this passes.
  gate:
    uses: ./.github/workflows/verify.yml

  build-and-publish:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      # Build the installer + update metadata (latest.yml, blockmap) into dist/, but do
      # NOT let electron-builder publish. Its GitHub publisher uploads assets concurrently
      # and each upload races to get-or-create the release, intermittently producing TWO
      # release objects for one tag with the assets split between them (this bit v0.1.0 and
      # v0.1.1). We publish deterministically below instead.
      #
      # Signing-ready, env-gated: electron-builder code-signs when CSC_LINK + CSC_KEY_PASSWORD
      # are present (a base64/URL-encoded PFX + its password, in repo secrets) and timestamps
      # via win.signtoolOptions.rfc3161TimeStampServer. When the secrets are unset they resolve
      # to empty strings and the build stays UNSIGNED exactly as before — no certificate is
      # provisioned yet. We deliberately do NOT hardcode signtoolOptions.publisherName: when a
      # cert is added, electron-builder derives the publisher (and app-update.yml's publisherName)
      # from the cert subject. Hardcoding it on an UNSIGNED build embeds publisherName into
      # app-update.yml and makes electron-updater reject every (unsigned) update — the 0.1.13→0.2.0
      # auto-update breakage. See docs/WINDOWS-SIGNING.md.
      - run: npx electron-builder --win --publish never
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}

      # One atomic `gh release create` uploads all three artifacts to a single release.
      # artifactName (package.json) yields a hyphenated installer name with no spaces, so
      # the uploaded asset name matches the url inside latest.yml exactly (else the updater
      # 404s). --generate-notes fills the body from commits since the previous tag.
      - name: Publish GitHub Release
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/*.exe dist/*.exe.blockmap dist/latest.yml \
            --title "Conduit $GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
