name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # Run the full authoritative gate (Biome, typecheck, tests, fallow, audit, Semgrep,
  # gitleaks) on Linux first. Semgrep has no native Windows build and the security scan
  # is best-effort there, so gating on Linux keeps it deterministic. The build only runs
  # if this passes.
  gate:
    uses: ./.github/workflows/verify.yml

  build-and-publish:
    needs: gate
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
