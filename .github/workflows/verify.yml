name: verify

on:
  push:
    branches: [main]
  pull_request:
  # Allow other workflows (e.g. release.yml) to run this exact gate as a job, so the
  # authoritative quality + security checks always run on Linux before a release builds.
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so gitleaks can scan every commit

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Deterministic checks (Biome format + lint)
        run: npm run check

      - name: Typecheck
        run: npm run typecheck

      - name: Build (bundle main + preload + renderer)
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Codebase analysis (Fallow — dead code + duplication)
        run: npm run fallow:check

      - name: Dependency audit (npm, high+)
        run: npm run audit

      - name: Security (Semgrep SAST)
        run: |
          pip install --quiet semgrep
          semgrep scan \
            --config p/javascript --config p/typescript --config p/react \
            --exclude node_modules --exclude out --exclude dist --exclude designs \
            --error

      - name: Secret scanning (gitleaks, full history)
        # Pinned binary download, not the marketplace action — action tags have been
        # force-pushed in supply-chain attacks (see solidify tooling reference).
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL -o gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks git . --redact --no-banner --exit-code 1
          rm -f gitleaks gitleaks.tar.gz

      - name: Complexity hotspots (Fallow health, advisory)
        continue-on-error: true
        run: npx fallow health
